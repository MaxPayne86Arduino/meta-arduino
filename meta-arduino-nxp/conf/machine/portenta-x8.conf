#@TYPE: Machine
#@NAME: Arduino Portenta-X8 i.MX8MM
#@SOC: i.MX8MM
#@DESCRIPTION: Machine configuration for Arduino Potenta-X8 (i.MX 8M Mini + STM32H7)
#@MAINTAINER: Massimo Pennazio <m.pennazio@arduino.cc>

require conf/machine/imx8mm-lpddr4-evk.conf

MACHINEOVERRIDES =. "mx8:mx8m:mx8mm:imx8mm-lpddr4-evk:"

# Override the variables you want to change here
IMX_DEFAULT_BSP = "nxp"
PREFERRED_PROVIDER:virtual/kernel = "linux-imx_6.6"
KBUILD_DEFCONFIG = ""

# Set KERNEL_DEVICETREE as empty since we are using a custom provider
#KERNEL_DEVICETREE = ""

# Since we are an override of imx8mm-lpddr4-evk, we need to adjust on top of what nxp bsp includes
KERNEL_DEVICETREE:remove = " \
    freescale/imx8mm-evk.dtb \
    freescale/imx8mm-evk-pcie-ep.dtb \
    freescale/imx8mm-evk-rm67191.dtb \
    freescale/imx8mm-evk-rm67191-cmd-ram.dtb \
    freescale/imx8mm-evk-rm67199.dtb \
    freescale/imx8mm-evk-rm67199-cmd-ram.dtb \
    freescale/imx8mm-evk-8mic-revE.dtb \
    freescale/imx8mm-evk-8mic-swpdm.dtb \
    freescale/imx8mm-evk-ak4497.dtb \
    freescale/imx8mm-evk-ak5558.dtb \
    freescale/imx8mm-evk-audio-tdm.dtb \
    freescale/imx8mm-evk-dpdk.dtb \
    freescale/imx8mm-evk-ecspi-slave.dtb \
    freescale/imx8mm-evk-lk.dtb \
    freescale/imx8mm-evk-inmate.dtb \
    freescale/imx8mm-evk-qca-wifi.dtb \
    freescale/imx8mm-evk-revb-qca-wifi.dtb \
    freescale/imx8mm-evk-root.dtb \
    freescale/imx8mm-evk-rpmsg.dtb \
    freescale/imx8mm-evk-rpmsg-wm8524.dtb \
    freescale/imx8mm-evk-rpmsg-wm8524-lpv.dtb \
    freescale/imx8mm-evk-usd-wifi.dtb \
"

PREFERRED_PROVIDER:virtual/dtb ?= "arduino-device-tree"

DTB_BOOT_FILES = " \
    devicetree/arduino_portenta-x8.dtb;arduino_portenta-x8.dtb \
    devicetree/*.dtbo;overlays/ \
"

IMAGE_BOOT_FILES:append:fsl-imx-xwayland = " ${DTB_BOOT_FILES}"

# Set machine features
#MACHINE_FEATURES = "usbgadget usbhost vfat alsa touchscreen screen wifi bluetooth optee rtc dpdk pci"

# Since we are an override of imx8mm-lpddr4-evk, we need to adjust on top of what nxp bsp provides
MACHINE_FEATURES:remove= " jailhouse bcm4359 bcm43455 bcm4356 nxp8987-sdio nxpwifi-all-sdio mxm-mwifiex-load"
MACHINE_FEATURES:append = " rtc"
MACHINE_FEATURES:append = " dpdk pci"

# Tweak machine features
MACHINE_FEATURES:remove = " \
    nxp8987-sdio \
    nxpwifi-all-sdio \
"

# Add additional firmware, mostly support for Murata 1DX WiFi / Bluetooth solution
MACHINE_FIRMWARE:append = " linux-firmware-cyw-fmac-fw linux-firmware-cyw-fmac-nvram linux-firmware-cyw-bt-patch"

# Added X8H7 solution based on ext. STM32 mcu
MACHINE_FIRMWARE:append = " linux-firmware-arduino-portenta-x8-stm32h7"

# Add custom video bridge and usb typec controller / power delivery solution
MACHINE_EXTRA_RRECOMMENDS += "anx7625"

# Add x8h7 driver for communication with external cortex processor via spi
MACHINE_EXTRA_RRECOMMENDS += "x8h7"

# Add extra kernel modules needed for Max carrier board
#MACHINE_EXTRA_RRECOMMENDS += "bq24195 cs42l52"

# Add mipi-csi cmos sensors drivers
#MACHINE_EXTRA_RRECOMMENDS += "ov5647-mipi imx219 imx477 imx708"

# Add mipi-dsi panels and touch screen controllers drivers
#MACHINE_EXTRA_RRECOMMENDS += "panel-sitronix-st7701 panel-jadard-ek79202d atmel-mxt-ts"

# Add neural external pcie modules drivers
MACHINE_EXTRA_RRECOMMENDS += "google-gasket-driver akida-pcie-driver hailo-pcie-driver"

# Module to load devicetree overlays at runtime in userspace
MACHINE_EXTRA_RRECOMMENDS:append = " dtbocfg"

# Portenta X8 has a Murata 1DX wifi/bt module which uses custom recipes
# linux-firmware-cyw-fmac-fw, linux-firmware-cyw-fmac-nvram and linux-firmware-cyw-bt-patch.
# Make sure we avoid default linux bcm43430 firmware
CORE_IMAGE_BASE_INSTALL:remove = " \
    linux-firmware-bcm43430 \
"

# Remove default linux-firmware and nxp-wifi firmware that are not needed
# and very big in size
CORE_IMAGE_BASE_INSTALL:remove = " \
    firmware-nxp-wifi \
    linux-firmware \
"

KERNEL_MODULE_AUTOLOAD:append = "anx7625 i2c-dev spidev"

# Custom wks file
WKS_FILE:mx8mm-nxp-bsp = "imx-imx-boot-singlepart.wks.in"

# @TODO: below seems to be ignored
SERIAL_CONSOLES = "115200;ttymxc2"

OSTREE_KERNEL_ARGS:portenta-x8 ?= "console=tty1 console=ttymxc2,115200 earlycon=ec_imx6q,0x30880000,115200 clk_ignore_unused ${OSTREE_KERNEL_ARGS_COMMON}"
