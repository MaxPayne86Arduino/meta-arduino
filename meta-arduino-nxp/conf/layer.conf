# We might have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a recipes directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes*/*/*.bb ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-arduino-nxp"
BBFILE_PATTERN_meta-arduino-nxp := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-arduino-nxp = "9"

LAYERDEPENDS_meta-arduino-nxp = "core freescale-layer fsl-bsp-release fsl-sdk-release"
LAYERSERIES_COMPAT_meta-arduino-nxp = "kirkstone nanbield"
