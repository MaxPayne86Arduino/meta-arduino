# We might have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a recipes directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes*/*/*.bb ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-arduino-lmp"
BBFILE_PATTERN_meta-arduino-lmp := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-arduino-lmp = "9"

LAYERDEPENDS_meta-arduino-lmp = "core meta-lmp-bsp meta-arduino-common"
LAYERSERIES_COMPAT_meta-arduino-lmp = "kirkstone nanbield scarthgap"
