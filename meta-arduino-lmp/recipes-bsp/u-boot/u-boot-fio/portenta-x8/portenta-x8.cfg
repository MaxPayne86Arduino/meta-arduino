# SPL
CONFIG_SPL_WATCHDOG=y
CONFIG_SPL_SYS_I2C_LEGACY=y

# Power management ICs
# CONFIG_POWER_PCA9450 is not set
CONFIG_POWER_BD71837=y

# Disable TCPC (Type-C Port Controller) support
# CONFIG_USB_TCPC is not set

# USB gadget (UMS) support
CONFIG_CMD_USB_MASS_STORAGE=y
CONFIG_USB_FUNCTION_MASS_STORAGE=y

# Enable the FAT environment
CONFIG_ENV_IS_IN_FAT=y
CONFIG_ENV_FAT_INTERFACE="mmc"
CONFIG_ENV_FAT_DEVICE_AND_PART="2:1"
CONFIG_ENG_FAT_FILE="boot.env"
