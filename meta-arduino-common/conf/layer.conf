# We might have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a recipes directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes*/*/*.bb ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-arduino-common"
BBFILE_PATTERN_meta-arduino-common := "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-arduino-common = "9"

LAYERDEPENDS_meta-arduino-common = "core"
LAYERSERIES_COMPAT_meta-arduino-common = "kirkstone nanbield scarthgap"
