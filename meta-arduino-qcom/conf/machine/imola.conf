#@TYPE: Machine
#@NAME: Arduino Imola (Arduino UNO Q)
#@SOC: Qualcomm QRB2210
#@DESCRIPTION: Machine configuration for Arduino Imola (Arduino UNO Q) board based on Qualcomm QRB2210 SoC and STM32 microcontroller.
#@MAINTAINER: Massimo Pennazio <maxipenna@libero.it>

require conf/machine/uno-q.conf

MACHINEOVERRIDES =. "uno-q:"

# Override the variables you want to change here
KERNEL_CMDLINE_EXTRA:append = "${@bb.utils.contains('PREFERRED_KERNEL', 'linux-qcom-next-rt', ' isolcpus=2,3 nohz_full=2,3 rcu_nocbs=2,3 irqaffinity=0-1 rcupdate.rcu_expedited=1 cpuidle.off=1', '', d)}"
