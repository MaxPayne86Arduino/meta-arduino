# We might have a conf and classes directory, append to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have a recipes directory, add to BBFILES
BBFILES += "${LAYERDIR}/recipes*/*/*.bb ${LAYERDIR}/recipes*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-arduino-qcom"
BBFILE_PATTERN_meta-arduino-qcom = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-arduino-qcom = "9"

LAYERDEPENDS_meta-arduino-qcom = "core qcom qcom-3rdparty meta-arduino-common"

LAYERSERIES_COMPAT_meta-arduino-qcom = "scarthgap whinlatter"
